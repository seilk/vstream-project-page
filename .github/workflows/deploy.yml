# vSTREAM Next.js prototype — GitHub Pages deploy
#
# IMPORTANT: GitHub Actions only runs workflows from the REPO ROOT
# `.github/workflows/` directory. To activate this, copy this file to:
#   <repo>/.github/workflows/deploy-prototype.yml
#
# Configure env.NEXT_PUBLIC_BASE_PATH below to match your Pages URL:
#   - Project page (https://<user>.github.io/<repo>/)   →  /<repo>
#   - User/org root page (https://<user>.github.io/)   →  (leave empty)
#
# In repo Settings → Pages: set Source = "GitHub Actions".

name: Deploy vSTREAM prototype to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '__icml2026--latex--arxiv/project_page/_previews/next-prototype/**'
      - '.github/workflows/deploy-prototype.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NEXT_PUBLIC_BASE_PATH: /mmreasoning
  WORKDIR: __icml2026--latex--arxiv/project_page/_previews/next-prototype

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.WORKDIR }}/package-lock.json

      - name: Install
        working-directory: ${{ env.WORKDIR }}
        run: npm ci || npm install

      - name: Build static export
        working-directory: ${{ env.WORKDIR }}
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ env.NEXT_PUBLIC_BASE_PATH }}
        run: |
          npm run build
          touch out/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.WORKDIR }}/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
